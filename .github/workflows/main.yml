name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.9u3e6hagAC }}" | docker login -u s4sheikh --password-stdin
    
      - name: Debug secrets
        run: |
          echo "username is ${{ secrets.s4sheikh }}"
          
      - name: Debug Docker username
        run: |
          echo "USERNAME START"
          echo "${{ secrets.s4sheikh }}"
          echo "USERNAME END"
        
      - name: Build Docker image
        run: docker build -t ${{ secrets.s4sheikh }}/devops-cicd-app1 .

      - name: Push Docker image
        run: docker push ${{ secrets.s4sheikh }}/devops-cicd-app1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.s4sheikh }}/devops-cicd-app1
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:3000 --name app ${{ secrets.s4sheikh }}/devops-cicd-app1
